<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>CodeSprint Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" th:href="@{/CSS/style.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">🚀 CodeSprint</a>
    <span class="text-white me-3" th:text="'Welcome, ' + ${student.name}"></span>
    <a href="/logout" class="btn btn-danger">Logout</a>
  </div>
</nav>
<div class="container mt-5">
  <div class="welcome-box">
    <h2>Welcome to CodeSprint</h2>
    <p>Learn Coding, Solve Problems and Track Progress</p>
  </div>
  <div class="row mt-5">
    <div class="col-md-4">
      <div class="dashboard-card">
        <i class="fa-solid fa-book"></i>
        <h4>Total Subjects</h4>
        <p th:text="${totalSubjects}">0</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="dashboard-card">
        <i class="fa-solid fa-circle-check"></i>
        <h4>Completed</h4>
        <p th:text="${completed}">0</p>
      </div>
    </div>
    <div class="col-md-4">
      <div class="dashboard-card">
        <i class="fa-solid fa-clock"></i>
        <h4>Pending</h4>
        <p th:text="${pending}">0</p>
      </div>
    </div>
  </div>
  <div class="text-center mt-5">
    <a href="/subjects" class="btn btn-lg btn-primary">Start Learning</a>
  </div>
</div>
</body>
</html>
