<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Subjects - CodeSprint</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" th:href="@{/CSS/style.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand">🚀 CodeSprint</a>
    <div>
      <a href="/dashboard" class="btn btn-outline-light me-2">Dashboard</a>
      <a href="/logout" class="btn btn-danger">Logout</a>
    </div>
  </div>
</nav>
<div class="container mt-2">
  <h2 class="text-center mb-4">Coding Subjects</h2>
  <div class="row">
    <div class="col-md-3 mb-4" th:each="subject : ${subjects}">
      <div class="card shadow h-100">
        <div class="card-body text-center">
          <i th:class="${subject.icon}" style="font-size:50px"></i>
          <h4 class="mt-3" th:text="${subject.subjectName}"></h4>
          <a th:href="@{/questions/{id}(id=${subject.id})}" class="btn btn-primary mt-2">View Questions</a>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
