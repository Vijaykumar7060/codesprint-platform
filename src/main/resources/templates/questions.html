<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Questions</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" th:href="@{/CSS/style.css}">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-3">
  <div class="container">
    <a class="navbar-brand">🚀 CodeSprint</a>
    <a href="/subjects" class="btn btn-outline-light me-2">Back to Subjects</a>
    <a href="/logout" class="btn btn-danger">Logout</a>
  </div>
</nav>
<div class="container mt-4">
  <h2 class="text-center">Coding Questions</h2>
  <div class="card mt-3 shadow" th:each="q : ${questions}">
    <div class="card-body">
      <h4 th:text="${q.title}">Question Title</h4>
      <p th:text="${q.description}">Question Description</p>
      <h6>Difficulty :
        <span class="badge bg-warning" th:text="${q.difficulty}">Easy</span>
      </h6>
      <span th:if="${statusMap[q.id] == 'completed'}" class="badge bg-success mb-2">✔ Completed</span>
      <span th:if="${statusMap[q.id] == 'pending'}" class="badge bg-danger mb-2">⏳ Pending</span>
      <br>
      <form th:action="@{/questions/mark}" method="post" style="display:inline">
        <input type="hidden" name="questionId" th:value="${q.id}"/>
        <input type="hidden" name="subjectId" th:value="${subjectId}"/>
        <button class="btn btn-success btn-sm" name="status" value="completed">Mark Completed</button>
        <button class="btn btn-danger btn-sm" name="status" value="pending">Mark Pending</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
